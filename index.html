<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>KLEI Tagesberichte DEV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1209;--s1:#141a0d;--s2:#1a2210;--s3:#202a14;--b:#2c3a1c;--g:#72b832;--gd:#4d8520;--gg:rgba(114,184,50,.1);--gl:#9ed45a;--earth:#9a6c1a;--earthg:rgba(154,108,26,.12);--sky:#3d8fa8;--skyg:rgba(61,143,168,.1);--r:#c44828;--rg:rgba(196,72,40,.1);--o:#d4782a;--c:#dce8c4;--m:#6a8848;--t:#b8cc98;--rad:4px;--ws:#8b5cf6;--wsg:rgba(139,92,246,.1);--gold:#c9a84c;--goldg:rgba(201,168,76,.12);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t);font-family:'IBM Plex Sans',sans-serif;font-size:13px;}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
.login-logo{width:140px;margin-bottom:8px;}
.login-title{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--m);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:8px;}
.login-card{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:24px;width:min(340px,92vw);}
.login-card-title{font-weight:700;font-size:16px;color:var(--c);margin-bottom:4px;}
.login-card-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--m);margin-bottom:20px;}
.login-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.login-field label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.2px;color:var(--m);text-transform:uppercase;}
.login-field input{background:var(--s3);border:1px solid var(--b);border-radius:var(--rad);color:var(--t);font-size:15px;padding:12px 14px;outline:none;width:100%;}
.login-field input:focus{border-color:var(--gd);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gd),var(--g));color:#0e1209;border:none;border-radius:var(--rad);padding:14px;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px;}
.login-btn.gold{background:linear-gradient(135deg,#a07830,var(--gold));}
.login-err{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--r);text-align:center;min-height:16px;margin-top:6px;}
.spin{width:16px;height:16px;border:2px solid var(--b);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
#gf-zugang-block{display:none;margin-top:14px;padding:14px;background:var(--goldg);border:1px solid rgba(201,168,76,.3);border-radius:8px;}
#master-screen{position:fixed;inset:0;background:#0a0a0f;z-index:9997;display:none;flex-direction:column;}
.master-header{background:#141420;border-bottom:1px solid rgba(201,168,76,.2);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.master-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 8px;border-radius:10px;background:var(--goldg);border:1px solid rgba(201,168,76,.3);color:var(--gold);}
.master-tabs{display:flex;border-bottom:1px solid rgba(201,168,76,.15);background:#141420;overflow-x:auto;}
.master-tab{padding:12px 16px;font-size:11px;font-weight:600;color:#666;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.master-tab.act{color:var(--gold);border-bottom-color:var(--gold);}
.master-content{flex:1;overflow-y:auto;padding:16px;background:#0a0a0f;}
.master-panel{display:none;}.master-panel.act{display:block;}
.m-sec{background:#141420;border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:16px;margin-bottom:14px;}
.m-sec-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,.15);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.kpi-card{background:#1a1a2e;border:1px solid rgba(201,168,76,.2);border-radius:var(--rad);padding:14px;}
.kpi-val{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;color:var(--gold);line-height:1;}
.kpi-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
.kpi-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#888;margin-top:2px;}
.progress-bar{height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.progress-fill.ok{background:var(--g);}.progress-fill.warn{background:var(--o);}.progress-fill.err{background:var(--r);}
.ma-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#1a1a2e;border:1px solid rgba(201,168,76,.1);border-radius:var(--rad);margin-bottom:6px;flex-wrap:wrap;}
.ma-score{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0;}
.score-a{background:rgba(114,184,50,.2);color:var(--gl);border:2px solid var(--gd);}
.score-b{background:rgba(201,168,76,.15);color:var(--gold);border:2px solid rgba(201,168,76,.4);}
.score-c{background:rgba(212,120,42,.15);color:var(--o);border:2px solid rgba(212,120,42,.4);}
.score-d{background:rgba(196,72,40,.15);color:var(--r);border:2px solid rgba(196,72,40,.4);}
.proj-row{background:#1a1a2e;border:1px solid rgba(201,168,76,.15);border-radius:var(--rad);padding:12px;margin-bottom:8px;}
.m-btn{background:#1a1a2e;border:1px solid rgba(201,168,76,.25);border-radius:var(--rad);padding:8px 14px;font-weight:600;font-size:12px;cursor:pointer;color:var(--gold);}
.m-btn-p{background:linear-gradient(135deg,#a07830,var(--gold));color:#0a0a0f;border:none;font-weight:700;}
.m-btn-r{background:rgba(196,72,40,.15);border-color:rgba(196,72,40,.3);color:var(--r);}
.m-input{background:#1a1a2e;border:1px solid rgba(201,168,76,.2);border-radius:var(--rad);color:#ddd;font-size:13px;padding:8px 10px;outline:none;width:100%;}
.m-input:focus{border-color:var(--gold);}
.m-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.2px;color:#888;text-transform:uppercase;display:block;margin-bottom:4px;}
.chart-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.chart-track{flex:1;height:18px;background:#1a1a2e;border-radius:3px;overflow:hidden;}
.chart-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#0a0a0f;font-weight:700;min-width:30px;}
.alert-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--rad);margin-bottom:6px;}
.alert-item.warn{background:rgba(212,120,42,.12);border:1px solid rgba(212,120,42,.25);}
.alert-item.ok{background:rgba(114,184,50,.1);border:1px solid rgba(114,184,50,.2);}
#admin-screen{position:fixed;inset:0;background:var(--bg);z-index:9996;display:none;flex-direction:column;}
#pl-screen{position:fixed;inset:0;background:var(--bg);z-index:9995;display:none;flex-direction:column;}
.admin-header{background:var(--s1);border-bottom:1px solid var(--b);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.admin-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 8px;border-radius:10px;}
.badge-admin{background:var(--skyg);border:1px solid rgba(61,143,168,.3);color:var(--sky);}
.badge-pl{background:var(--earthg);border:1px solid rgba(154,108,26,.3);color:var(--earth);}
.admin-tabs{display:flex;border-bottom:1px solid var(--b);background:var(--s1);overflow-x:auto;}
.admin-tab{padding:12px 16px;font-size:11px;font-weight:600;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.admin-tab.act{color:var(--sky);border-bottom-color:var(--sky);}
.pl-tab.act{color:var(--earth);border-bottom-color:var(--earth);}
.admin-content{flex:1;overflow-y:auto;padding:16px;}
.admin-panel{display:none;}.admin-panel.act{display:block;}
.a-sec{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:16px;margin-bottom:14px;}
.a-sec-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--sky);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b);}
.a-sec-title.earth{color:var(--earth);}.a-sec-title.ws{color:var(--ws);}
.ma-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s3);border:1px solid var(--b);border-radius:var(--rad);margin-bottom:6px;flex-wrap:wrap;}
.ma-nr{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--sky);width:50px;flex-shrink:0;}
.ma-info{flex:1;min-width:120px;}
.ma-name-el{font-size:13px;font-weight:600;color:var(--c);}
.ma-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--m);margin-top:1px;}
.ma-rolle{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 6px;border-radius:8px;}
.ma-rolle.arbeiter{background:var(--gg);color:var(--gl);}
.ma-rolle.vorarbeiter{background:var(--earthg);color:var(--earth);}
.ma-rolle.admin,.ma-rolle.verwaltung{background:var(--skyg);color:var(--sky);}
.ma-rolle.werkstatt{background:var(--wsg);color:var(--ws);}
.ma-rolle.projektleiter{background:var(--earthg);color:var(--earth);}
.ma-aktiv{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ma-aktiv.on{background:var(--g);}.ma-aktiv.off{background:var(--r);}
.fz-item{background:var(--s3);border:1px solid var(--b);border-radius:var(--rad);padding:12px;margin-bottom:8px;}
.fz-kz{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:var(--ws);margin-bottom:4px;}
.fz-info{font-size:11px;color:var(--m);}
.fz-status{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.fz-badge{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 6px;border-radius:8px;}
.fz-ok{background:rgba(114,184,50,.12);color:var(--g);}
.fz-warn{background:rgba(212,120,42,.15);color:var(--o);}
.fz-err{background:var(--rg);color:var(--r);}
.email-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s3);border:1px solid var(--b);border-radius:var(--rad);margin-bottom:6px;flex-wrap:wrap;}
.email-toggle{width:40px;height:22px;background:var(--s2);border:1px solid var(--b);border-radius:11px;cursor:pointer;position:relative;flex-shrink:0;transition:all .2s;}
.email-toggle.on{background:var(--g);border-color:var(--gd);}
.email-toggle::after{content:'';position:absolute;width:16px;height:16px;background:white;border-radius:50%;top:2px;left:2px;transition:all .2s;}
.email-toggle.on::after{left:20px;}
.pl-bericht{background:var(--s3);border:1px solid var(--b);border-radius:var(--rad);padding:12px;margin-bottom:8px;cursor:pointer;}
.pl-bericht.abgenommen{border-color:var(--gd);background:rgba(114,184,50,.05);}
.pl-bericht-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;}
.pl-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--b);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.pl-check.done{background:var(--g);border-color:var(--gd);}
#sig-canvas{background:white;border-radius:var(--rad);cursor:crosshair;touch-action:none;}
.sig-wrap{background:white;border-radius:var(--rad);display:inline-block;border:2px solid var(--b);}
header{height:46px;background:var(--s1);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;}
.h-logo{height:26px;}
.h-divider{width:1px;height:20px;background:var(--b);margin:0 2px;}
.role-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 7px;border-radius:20px;}
.role-badge.arbeiter{background:var(--gg);color:var(--gl);border:1px solid var(--gd);}
.role-badge.vorarbeiter{background:var(--earthg);color:var(--earth);border:1px solid var(--earth);}
.role-badge.werkstatt{background:var(--wsg);color:var(--ws);border:1px solid rgba(139,92,246,.4);}
.h-user{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--m);}
.h-right{margin-left:auto;display:flex;gap:5px;align-items:center;}
.hbtn{background:none;border:1px solid var(--b);border-radius:var(--rad);padding:6px 10px;color:var(--m);font-family:'IBM Plex Mono',monospace;font-size:9px;cursor:pointer;white-space:nowrap;}
.va-only{display:none;}
.app{display:grid;grid-template-columns:200px 1fr;height:calc(100vh - 46px);}
aside{background:var(--s1);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:10px;border-bottom:1px solid var(--b);}
.sb-date{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--m);margin-bottom:6px;}
.btn-new{width:100%;background:linear-gradient(135deg,var(--gd),var(--g));color:#0e1209;border:none;border-radius:var(--rad);padding:10px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-new.ws{background:linear-gradient(135deg,#7c3aed,var(--ws));}
.sb-list{overflow-y:auto;flex:1;padding:6px;}
.ri{padding:8px 10px;border-radius:var(--rad);cursor:pointer;border:1px solid transparent;margin-bottom:2px;}
.ri.act{background:var(--gg);border-color:var(--gd);}
.ri-d{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--g);margin-bottom:2px;}
.ri-n{font-size:12px;font-weight:600;color:var(--c);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ri-s{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--m);margin-top:1px;}
.ri-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.tag-s{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:1px 5px;border-radius:10px;}
.tag-g{background:rgba(114,184,50,.12);color:var(--g);}
.tag-e{background:rgba(154,108,26,.15);color:var(--earth);}
.tag-ws{background:rgba(139,92,246,.12);color:var(--ws);}
main{display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b);padding:0 12px;overflow-x:auto;}
.tab{padding:12px 14px;font-size:11px;font-weight:600;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.act{color:var(--gl);border-bottom-color:var(--g);}
.content{flex:1;overflow-y:auto;padding:12px 14px;padding-bottom:70px;}
.panel{display:none;}.panel.act{display:block;}
.vbar{background:rgba(196,72,40,.15);border:1px solid rgba(196,72,40,.4);border-radius:var(--rad);padding:10px 14px;margin-bottom:10px;display:none;align-items:center;gap:10px;}
.vbar.on{display:flex;}
.vbar-lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--r);flex:1;}
.vbar-stop{background:var(--r);color:white;border:none;border-radius:var(--rad);padding:6px 14px;font-weight:700;font-size:11px;cursor:pointer;}
.mic-btn{display:inline-flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--b);border-radius:20px;padding:7px 14px;font-size:11px;font-weight:600;color:var(--m);cursor:pointer;margin-top:6px;}
.mic-btn.on{background:rgba(196,72,40,.15);border-color:var(--r);color:var(--r);}
.row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:90px;}
.fg.w100{flex:0 0 100%;}.fg.w50{flex:0 0 calc(50% - 4px);}.fg.w33{flex:0 0 calc(33.33% - 6px);}.fg.w25{flex:0 0 calc(25% - 6px);}
label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.2px;color:var(--m);text-transform:uppercase;}
input,textarea,select{background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);color:var(--t);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:8px 10px;outline:none;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--gd);}
textarea{resize:vertical;min-height:70px;}
select option{background:var(--s2);}
.sec{margin-bottom:14px;}
.sh{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--m);padding-bottom:6px;border-bottom:1px solid var(--b);margin-bottom:10px;}
.wrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.wc{background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:8px 12px;cursor:pointer;font-size:12px;}
.wc.s{background:var(--gg);border-color:var(--gd);color:var(--gl);}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.tg{background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:5px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--m);cursor:pointer;}
.tg.a{background:var(--gg);border-color:var(--gd);color:var(--gl);}
.zusatz-projekt-block{background:var(--s2);border:1px solid rgba(154,108,26,.3);border-radius:6px;padding:12px;margin-top:10px;}
.tbl{width:100%;border-collapse:collapse;font-size:11px;}
.tbl th{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--m);padding:5px 6px;border-bottom:1px solid var(--b);text-align:left;}
.tbl td{padding:4px 3px;border-bottom:1px solid rgba(44,58,28,.4);}
.tbl td input,.tbl td select{background:transparent;border:none;border-radius:0;padding:3px 4px;font-size:11px;}
.tbl td select{background:var(--s2);border-radius:3px;border:1px solid var(--b);}
.delbtn{background:none;border:none;color:var(--m);cursor:pointer;padding:2px 6px;font-size:14px;}
.tbl-wrap{overflow-x:auto;margin-bottom:6px;}
.lief-block{background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:12px;margin-bottom:8px;}
.lief-head{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.lief-num{width:22px;height:22px;background:var(--earthg);border:1px solid var(--earth);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--earth);flex-shrink:0;}
.mangel-block{background:var(--rg);border:1px solid rgba(196,72,40,.25);border-radius:var(--rad);padding:10px;margin-bottom:6px;}
.btn{background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:8px 14px;font-weight:600;font-size:12px;cursor:pointer;color:var(--t);display:inline-flex;align-items:center;gap:5px;}
.btn-p{background:linear-gradient(135deg,var(--gd),var(--g));color:#0e1209;border:none;font-weight:700;}
.btn-e{background:var(--earthg);border-color:rgba(154,108,26,.4);color:var(--earth);}
.btn-r{background:var(--rg);border-color:rgba(196,72,40,.3);color:var(--r);}
.btn-sky{background:var(--skyg);border-color:rgba(61,143,168,.3);color:var(--sky);}
.btn-ws{background:var(--wsg);border-color:rgba(139,92,246,.3);color:var(--ws);}
.arow{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;border-top:1px solid var(--b);margin-top:12px;position:sticky;bottom:0;background:var(--bg);z-index:40;}
.fahrt-btn{flex:1;padding:10px 6px;border-radius:var(--rad);background:var(--s3);border:1px solid var(--b);color:var(--m);font-weight:600;font-size:12px;cursor:pointer;text-align:center;line-height:1.4;}
.fahrt-btn.fahrt-active[data-val="fahrer"]{background:rgba(61,143,168,.15);border-color:var(--sky);color:var(--sky);}
.fahrt-btn.fahrt-active[data-val="beifahrer"]{background:rgba(154,108,26,.18);border-color:var(--earth);color:var(--earth);}
.fahrt-btn.fahrt-active[data-val="privat"]{background:rgba(114,184,50,.12);border-color:var(--gd);color:var(--gl);}

<script>
const SUPA_URL='https://nctciyyshywmdamyqvqo.supabase.co';
const SUPA_KEY='sb_publishable_or0S3skW6i6-jfofutK_jQ_sA3urW4y';
const GAS_URL='https://script.google.com/macros/s/AKfycbxVQNF3dwQo4qHYOImHNg44SPhs6NZ-8XxOMWqHzvEhjyS1pc0V_AncqG3B01i2TmlW1w/exec';
const FIRMA_NAME='Friedrich Klei GmbH';
const FIRMA_ADRESSE='Stettiner Str. 14-16 - 34225 Baunatal';
const FIRMA_TEL='+49 (0) 5601 8056';
const FIRMA_WEB='www.klei-sportplatzbau.de';
const FIRMA_LOGO='https://www.klei-sportplatzbau.de/images/logos/KLEI_LOGO_FARBIG_RGB_72DPI.png';
const{createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);

const TAETIGKEITEN=['Vorbereitung','Baustelle allgemein','Abbruch','Erdarbeiten','Entwaesserung','Elektro','Unterbau','Einfassung','Wegebau','Treppen','Mauern','Vegetation','Rasen','Pflege'];
const TAETIGKEITEN_WS=['Werkstatt allgemein','Oelwechsel','Reparatur','Wartung','Inspektion','Reifenwechsel','Reinigung','Reparaturfahrt','Sonstiges'];
const GERAETE=[{nr:'1010',bez:'Radlader 5 to'},{nr:'1012',bez:'Bagger Kette 5 to'},{nr:'1014',bez:'Bagger Rad 18 to'},{nr:'1016',bez:'Bagger Kette >15 to'},{nr:'1018',bez:'LKW 25 to'},{nr:'1019',bez:'LKW 5-15 to'},{nr:'1020',bez:'Raupe Planierr.'},{nr:'1050',bez:'Elektr. Kleingeraet'},{nr:'1052',bez:'Motorg. Kleingeraet'},{nr:'1055',bez:'PKW'},{nr:'1060',bez:'Maeher Grossflaeche'},{nr:'1061',bez:'Handmaeher'},{nr:'1065',bez:'Baustrassen-Securatec'},{nr:'1070',bez:'Maschinen (Kompressor)'},{nr:'1080',bez:'Verdichtung >2 to'},{nr:'1081',bez:'Ruettelplatte'},{nr:'1082',bez:'Stampfer'},{nr:'1200',bez:'Baustelleneinrichtung'},{nr:'1500',bez:'Tankanlagen'},{nr:'1600',bez:'Absperrung'},{nr:'1700',bez:'Vermessungsgeraet'},{nr:'2000',bez:'LKW <7 to'}];
const PAUSEN=[0,15,30,45,60,75,90];

let currentUser=null,PROJEKTE=[],reports=[],FAHRZEUGE=[];
let currentId=null,currentRole=null,curWeather='Sonnig';
let stepIdx=0,liefIdx=0,mangelIdx=0,zusatzProjektIdx=0,curFahrtStatus='fahrer';
let fotoDataUrls=[],kalMonat=new Date().getMonth(),kalJahr=new Date().getFullYear();
let voiceActive=false,voiceTarget=null,recognition=null;
let unterschriftData=null,sigDrawing=false,sigCtx=null,sigCanvas=null;

function checkGFNr(val){const block=document.getElementById('gf-zugang-block');if(block)block.style.display=val==='7117'?'block':'none';}

async function doMasterLoginInline(){
  const pw=document.getElementById('login-master-pw').value.trim();
  const errEl=document.getElementById('login-err');errEl.textContent='';
  if(!pw){errEl.textContent='Master-Passwort eingeben';return;}
  try{
    const{data,error}=await sb.from('gf_config').select('wert').eq('schluessel','master_passwort').single();
    if(error||!data){errEl.textContent='Konfigurationsfehler';return;}
    if(pw!==data.wert){errEl.textContent='Falsches Master-Passwort';return;}
    document.getElementById('login-master-pw').value='';document.getElementById('login-nr').value='';
    document.getElementById('gf-zugang-block').style.display='none';
    document.getElementById('login-screen').style.display='none';
    await loadProjekte();openMasterCockpit();
  }catch(e){errEl.textContent='Fehler: '+e.message;}
}
document.getElementById('login-master-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doMasterLoginInline();});
function doMasterLogout(){document.getElementById('master-screen').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('login-nr').value='';}

async function doLogin(){
  const nr=document.getElementById('login-nr').value.trim();
  const pw=document.getElementById('login-pw').value.trim();
  const errEl=document.getElementById('login-err');errEl.textContent='';
  if(!nr||!pw){errEl.textContent='Bitte Nummer und Passwort eingeben';return;}
  const btn=document.querySelector('#login-screen .login-btn');btn.innerHTML='<div class="spin"></div>';btn.disabled=true;
  try{
    const{data,error}=await sb.from('mitarbeiter').select('*').eq('mitarbeiter_nr',nr).eq('passwort_hash',pw).eq('aktiv',true).single();
    if(error||!data){errEl.textContent='Falsche Mitarbeiternummer oder Passwort';btn.innerHTML='Anmelden';btn.disabled=false;return;}
    currentUser=data;unterschriftData=data.unterschrift_data||null;
    document.getElementById('login-screen').style.display='none';
    await loadProjekte();
    if(data.rolle==='admin'||data.rolle==='verwaltung')openAdmin();
    else if(data.rolle==='projektleiter')openPL();
    else await initApp();
  }catch(e){errEl.textContent='Verbindungsfehler: '+e.message;btn.innerHTML='Anmelden';btn.disabled=false;}
}
document.getElementById('login-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('login-nr').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pw').focus();});

function doLogout(){
  currentUser=null;reports=[];currentId=null;currentRole=null;unterschriftData=null;
  ['admin-screen','pl-screen','master-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-nr').value='';document.getElementById('login-pw').value='';
  document.getElementById('login-err').textContent='';
  const btn=document.querySelector('#login-screen .login-btn');btn.innerHTML='Anmelden';btn.disabled=false;
}

async function loadProjekte(){const{data}=await sb.from('projekte').select('*').eq('aktiv',true).order('nr');if(data)PROJEKTE=data;}
async function loadFahrzeuge(){const{data}=await sb.from('fahrzeuge').select('*').eq('aktiv',true).order('kennzeichen');if(data)FAHRZEUGE=data;}
async function loadReports(){const{data}=await sb.from('berichte').select('*').eq('mitarbeiter_id',currentUser.id).order('datum',{ascending:false}).order('erstellt_am',{ascending:false}).limit(100);if(data)reports=data;}

async function initApp(){
  try{
    currentRole=currentUser.rolle;
    await loadReports();await loadFahrzeuge();
    const b=document.getElementById('role-badge');
    b.className='role-badge '+(currentRole==='werkstatt'?'werkstatt':currentRole);
    b.textContent={arbeiter:'Arbeiter',vorarbeiter:'Vorarbeiter',werkstatt:'Werkstatt'}[currentRole]||currentRole;
    document.getElementById('h-user-name').textContent=currentUser.name+' #'+currentUser.mitarbeiter_nr;
    if(currentRole==='werkstatt')document.getElementById('btn-new-bericht').className='btn-new ws';
    buildUI();renderSB();updateSBDate();
    if(reports.length)loadReport(reports[0].id);
    else setTimeout(()=>{if(currentRole==='arbeiter')initARForm();else if(currentRole==='werkstatt')initWSForm();},300);
  }catch(e){toast('Fehler: '+e.message,'err');console.error(e);}
}

// HILFSFUNKTIONEN
function getProjektLabel(nrOrId){const p=PROJEKTE.find(x=>x.id===nrOrId||x.nr===nrOrId);return p?p.nr+' - '+p.name:(nrOrId||'--');}
function getProjektFahrzeit(nrOrId){const p=PROJEKTE.find(x=>x.id===nrOrId||x.nr===nrOrId);return p?parseInt(p.fahrzeit_min||0):0;}
function projektOpts(sel){return'<option value="">- Projekt waehlen -</option>'+PROJEKTE.map(p=>'<option value="'+p.id+'" '+(sel===p.id||sel===p.nr?'selected':'')+'>'+p.nr+' - '+p.name+(p.fahrzeit_min?' ('+p.fahrzeit_min+'min)':'')+'</option>').join('');}
function taetigkeitenTags(sel,liste){const list=liste||TAETIGKEITEN;return list.map(t=>'<div class="tg'+((sel||[]).includes(t)?' a':'')+'" onclick="togTg(this)">'+t+'</div>').join('');}
function pausenSelect(val,cls){return'<select class="'+cls+'" style="width:72px" onchange="calcZR(this)">'+PAUSEN.map(p=>'<option value="'+p+'" '+(parseInt(val||30)===p?'selected':'')+'>'+p+'min</option>').join('')+'</select>';}
function togTg(el){el.classList.toggle('a');}
function selW(el,val){document.querySelectorAll('.wc').forEach(c=>c.classList.remove('s'));el.classList.add('s');curWeather=val;}
function setFahrt(btn){document.querySelectorAll('.fahrt-btn').forEach(b=>b.classList.remove('fahrt-active'));btn.classList.add('fahrt-active');curFahrtStatus=btn.dataset.val;calcAR();}
function getARTaetigkeiten(){return[...document.querySelectorAll('#ar-taetigkeiten-tags .tg.a')].map(t=>t.textContent);}
function getVATaetigkeiten(){return[...document.querySelectorAll('#va-taetigkeiten-tags .tg.a')].map(t=>t.textContent);}
function getWSTaetigkeiten(){return[...document.querySelectorAll('#ws-taetigkeiten-tags .tg.a')].map(t=>t.textContent);}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtD(d){if(!d)return'--';const p=String(d).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:d;}
function dlFile(name,content,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+type+' show';setTimeout(()=>el.classList.remove('show'),3000);}
function updateSBDate(){const el=document.getElementById('sb-date');if(el)el.textContent=new Date().toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});}
function openMo(id){const el=document.getElementById(id);if(el){el.style.opacity='1';el.style.pointerEvents='all';}}
function closeMo(id){const el=document.getElementById(id);if(el){el.style.opacity='0';el.style.pointerEvents='none';}}
function getWeekStart(){const d=new Date();d.setDate(d.getDate()-d.getDay()+1);return d.toISOString().split('T')[0];}
function buildPDFName(data){const proj=(data.projekt_nr||'unbekannt').replace(/[^a-zA-Z0-9_\-]/g,'_');const name=(data.mitarbeiter_name||'').split(' ').pop().replace(/[^a-zA-Z0-9_\-]/g,'_');return(data.datum||'')+'_'+proj+'_'+name+'_'+(data.mitarbeiter_nr||'')+'_'+(data.rolle||'ar').toUpperCase()+'.pdf';}

function handleFotos(input){const files=[...input.files].slice(0,5);if(!files.length)return;fotoDataUrls=[];const preview=document.getElementById('v-fotos-preview');const count=document.getElementById('v-fotos-count');if(preview)preview.innerHTML='';let loaded=0;files.forEach((file,idx)=>{const reader=new FileReader();reader.onload=(e)=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');let w=img.width,h=img.height;const mx=1200;if(w>mx){h=Math.round(h*mx/w);w=mx;}if(h>mx){w=Math.round(w*mx/h);h=mx;}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);const dataUrl=canvas.toDataURL('image/jpeg',0.75);fotoDataUrls[idx]=dataUrl;loaded++;if(preview){const div=document.createElement('div');div.className='foto-item';div.id='foto-prev-'+idx;div.innerHTML='<img src="'+dataUrl+'"><button class="foto-del" onclick="removeFoto('+idx+')">x</button>';preview.appendChild(div);}if(count)count.textContent=loaded+' Foto'+(loaded===1?'':'s');};img.src=e.target.result;};reader.readAsDataURL(file);});}
function removeFoto(idx){fotoDataUrls[idx]=null;const p=document.getElementById('foto-prev-'+idx);if(p)p.remove();}
function clearFotos(){fotoDataUrls=[];const p=document.getElementById('v-fotos-preview');if(p)p.innerHTML='';const c=document.getElementById('v-fotos-count');if(c)c.textContent='Keine Fotos';const i=document.getElementById('v-fotos-input');if(i)i.value='';}

function startVoice(targetId,label){const el=document.getElementById(targetId);if(!el)return;if(voiceActive&&voiceTarget===targetId){stopVoice();return;}if(voiceActive)stopVoice();const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Spracheingabe nicht verfuegbar','err');return;}voiceTarget=targetId;voiceActive=true;recognition=new SR();recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=true;const existing=el.value?el.value.trim()+' ':'';let addedFinal='',lastSaved='';showVoiceBanner(label);recognition.onresult=(e)=>{let nf='',it='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)nf+=e.results[i][0].transcript+' ';else it+=e.results[i][0].transcript;}if(nf){addedFinal+=nf;lastSaved=addedFinal;}el.value=(existing+addedFinal+(it?'('+it+')':'')).trim();};recognition.onend=()=>{el.value=(existing+(lastSaved||addedFinal)).trim();voiceActive=false;hideVoiceBanner();recognition=null;};recognition.onerror=()=>{stopVoice();};try{recognition.start();}catch(e){stopVoice();}}
function stopVoice(){voiceActive=false;if(recognition){try{recognition.stop();}catch(e){}recognition=null;}hideVoiceBanner();voiceTarget=null;}
function showVoiceBanner(label){let bar=document.getElementById('vbar-global');if(!bar){bar=document.createElement('div');bar.id='vbar-global';bar.className='vbar';bar.innerHTML='<div class="vbar-lbl" id="vbar-lbl-text"></div><button class="vbar-stop" onclick="stopVoice()">STOP</button>';const content=document.getElementById('main-content');if(content)content.prepend(bar);}bar.classList.add('on');const lbl=document.getElementById('vbar-lbl-text');if(lbl)lbl.textContent=label+' - sprechen...';}
function hideVoiceBanner(){const bar=document.getElementById('vbar-global');if(bar)bar.classList.remove('on');}
function mkMic(targetId,label){return'<button class="mic-btn" onclick="startVoice(\''+targetId+'\',\''+label+'\')">&#127908; '+label+'</button>';}

function openProfil(){
  const el=document.getElementById('profil-content');
  el.innerHTML='<div style="margin-bottom:16px"><div style="font-size:14px;font-weight:700;color:var(--c)">'+currentUser.name+'</div><div style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:var(--m);margin-top:2px">#'+currentUser.mitarbeiter_nr+' · '+currentUser.qualifikation+'</div></div>'+
    '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:var(--m);text-transform:uppercase;margin-bottom:8px">Meine Unterschrift</div>'+
    (unterschriftData?'<div style="margin-bottom:10px"><img src="'+unterschriftData+'" style="max-width:100%;border-radius:4px;border:1px solid var(--b);background:white;padding:4px"></div><div style="display:flex;gap:6px"><button class="btn btn-r" style="font-size:11px" onclick="clearSig()">Loeschen</button><button class="btn" style="font-size:11px" onclick="showSigPad()">Neu</button></div>':'<button class="btn btn-p" onclick="showSigPad()">Unterschrift zeichnen</button>')+
    '<div id="sig-pad-wrap" style="display:none;margin-top:14px"><div class="sig-wrap"><canvas id="sig-canvas" width="320" height="120"></canvas></div><div style="display:flex;gap:6px;margin-top:8px"><button class="btn btn-p" style="font-size:11px" onclick="saveSig()">Speichern</button><button class="btn" style="font-size:11px" onclick="clearSigPad()">Loeschen</button></div></div>';
  openMo('mo-profil');
}
function showSigPad(){document.getElementById('sig-pad-wrap').style.display='block';setTimeout(()=>initSigCanvas(),100);}
function initSigCanvas(){sigCanvas=document.getElementById('sig-canvas');if(!sigCanvas)return;sigCtx=sigCanvas.getContext('2d');sigCtx.strokeStyle='#1a1a1a';sigCtx.lineWidth=2;sigCtx.lineCap='round';sigDrawing=false;const getPos=(e)=>{const rect=sigCanvas.getBoundingClientRect();const sx=sigCanvas.width/rect.width,sy=sigCanvas.height/rect.height;if(e.touches)return{x:(e.touches[0].clientX-rect.left)*sx,y:(e.touches[0].clientY-rect.top)*sy};return{x:(e.clientX-rect.left)*sx,y:(e.clientY-rect.top)*sy};};sigCanvas.onmousedown=sigCanvas.ontouchstart=(e)=>{e.preventDefault();sigDrawing=true;const pos=getPos(e);sigCtx.beginPath();sigCtx.moveTo(pos.x,pos.y);};sigCanvas.onmousemove=sigCanvas.ontouchmove=(e)=>{e.preventDefault();if(!sigDrawing)return;const pos=getPos(e);sigCtx.lineTo(pos.x,pos.y);sigCtx.stroke();};sigCanvas.onmouseup=sigCanvas.ontouchend=(e)=>{e.preventDefault();sigDrawing=false;};}
function clearSigPad(){if(sigCtx&&sigCanvas)sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);}
async function saveSig(){if(!sigCanvas)return;const dataUrl=sigCanvas.toDataURL('image/png');const{error}=await sb.from('mitarbeiter').update({unterschrift_data:dataUrl}).eq('id',currentUser.id);if(error){toast('Fehler','err');return;}unterschriftData=dataUrl;currentUser.unterschrift_data=dataUrl;toast('Gespeichert','ok');closeMo('mo-profil');setTimeout(()=>openProfil(),200);}
async function clearSig(){await sb.from('mitarbeiter').update({unterschrift_data:null}).eq('id',currentUser.id);unterschriftData=null;currentUser.unterschrift_data=null;toast('Geloescht','ok');closeMo('mo-profil');setTimeout(()=>openProfil(),200);}

async function getActiveEmpfaenger(){
  const{data}=await sb.from('email_empfaenger').select('*').eq('aktiv',true);
  if(!data||!data.length)return{to:['kleizeitmanager34@gmail.com'],cc:[]};
  const to=data.filter(e=>e.typ!=='cc').map(e=>e.email).filter(Boolean);
  const cc=data.filter(e=>e.typ==='cc').map(e=>e.email).filter(Boolean);
  return{to:to.length?to:['kleizeitmanager34@gmail.com'],cc};
}

// WERKSTATT
function buildWS(){
  const wsProjekt=PROJEKTE.find(p=>p.name.toLowerCase().includes('werkstatt'))||PROJEKTE[0];
  return'<div class="qsec"><div class="qsec-t" style="color:var(--ws)">Werkstatt Einsatz</div><div class="row"><div class="fg w50"><label>Datum</label><input type="date" id="ws-datum"></div><div class="fg w50"><label>Name</label><input type="text" id="ws-name" readonly style="color:var(--ws);background:var(--s3)"></div><div class="fg w100"><label>Projekt</label><select id="ws-projekt">'+projektOpts(wsProjekt?.id||'')+'</select></div></div></div>'+
    '<div class="qsec"><div class="qsec-t" style="color:var(--ws)">Taetigkeiten</div><div class="tags" id="ws-taetigkeiten-tags">'+taetigkeitenTags([],TAETIGKEITEN_WS)+'</div></div>'+
    '<div class="qsec"><div class="qsec-t" style="color:var(--ws)">Fahrzeug</div><select id="ws-fahrzeug"><option value="">- Fahrzeug waehlen -</option>'+FAHRZEUGE.map(fz=>'<option value="'+fz.id+'">'+fz.kennzeichen+' - '+fz.typ+'</option>').join('')+'</select></div>'+
    '<div class="qsec"><div class="qsec-t" style="color:var(--ws)">Arbeitszeiten</div><div class="row"><div class="fg w25"><label>Beginn</label><input type="time" id="ws-von" value="07:00" oninput="calcWS()"></div><div class="fg w25"><label>Ende</label><input type="time" id="ws-bis" value="16:00" oninput="calcWS()"></div><div class="fg w25"><label>Pause</label><select id="ws-pause" onchange="calcWS()">'+PAUSEN.map(p=>'<option value="'+p+'" '+(p===30?'selected':'')+'>'+p+' min</option>').join('')+'</select></div><div class="fg w25"><label>Netto</label><input type="text" id="ws-netto" readonly style="color:var(--ws);font-weight:700;font-family:\'IBM Plex Mono\',monospace;font-size:18px"></div></div></div>'+
    '<div class="qsec"><div class="qsec-t" style="color:var(--ws)">Details</div><textarea id="ws-taetigkeit" placeholder="Beschreibung..."></textarea>'+mkMic('ws-taetigkeit','Arbeiten')+'<div style="margin-top:8px"><input type="text" id="ws-maengel" placeholder="Maengel...">'+mkMic('ws-maengel','Maengel')+'</div></div>'+
    '<div class="send-status" id="ws-send-status"></div>'+
    '<div class="arow"><button class="btn btn-ws" style="font-weight:700" onclick="saveAndSendWS()">Speichern und PDF senden</button><button class="btn" onclick="clearWSForm()">Neu</button></div>';
}
function initWSForm(){const n=document.getElementById('ws-name');if(n)n.value=currentUser.name;const d=document.getElementById('ws-datum');if(d)d.value=todayStr();calcWS();}
function calcWS(){const v=document.getElementById('ws-von')?.value,b=document.getElementById('ws-bis')?.value,p=parseFloat(document.getElementById('ws-pause')?.value)||0;if(v&&b){const[vh,vm]=v.split(':').map(Number),[bh,bm]=b.split(':').map(Number);let wm=(bh*60+bm)-(vh*60+vm)-p;if(wm<0)wm+=1440;const el=document.getElementById('ws-netto');if(el)el.value=(wm/60).toFixed(2).replace('.',',');}}
function clearWSForm(){currentId=null;stopVoice();const d=document.getElementById('ws-datum');if(d)d.value=todayStr();['ws-taetigkeit','ws-maengel'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});const v=document.getElementById('ws-von');if(v)v.value='07:00';const bs=document.getElementById('ws-bis');if(bs)bs.value='16:00';const ps=document.getElementById('ws-pause');if(ps)ps.value='30';document.querySelectorAll('#ws-taetigkeiten-tags .tg').forEach(t=>t.classList.remove('a'));calcWS();toast('Neuer Werkstatt-Bericht','ok');}

function buildFZListe(){const el=document.getElementById('fzliste-content');if(!el)return;el.innerHTML='<div class="a-sec" style="border-color:rgba(139,92,246,.2)"><div class="a-sec-title ws">Fahrzeug anlegen</div>'+buildFZFormHTML('ws-fz')+'<button class="btn btn-ws" onclick="wsAddFZ()">+ Fahrzeug anlegen</button></div><div style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:var(--ws);text-transform:uppercase;margin:10px 0 8px">Fahrzeugliste</div>'+(FAHRZEUGE.length?FAHRZEUGE.map(fz=>renderFZItem(fz)).join(''):'<div class="empty"><div class="ei">&#128663;</div><div class="et">Keine Fahrzeuge</div></div>');}
async function wsAddFZ(){const d=getFZFormData('ws-fz');if(!d.kennzeichen||!d.typ){toast('Kennzeichen und Typ erforderlich','err');return;}const{error}=await sb.from('fahrzeuge').insert({...d,aktiv:true});if(error){toast('Fehler: '+error.message,'err');return;}await loadFahrzeuge();toast('Fahrzeug angelegt','ok');buildFZListe();}

// AR FORM
function buildAR(){
  return'<div class="qsec"><div class="qsec-t">Einsatz</div><div class="row"><div class="fg w50"><label>Datum</label><input type="date" id="a-datum"></div><div class="fg w50"><label>Name</label><input type="text" id="a-name" readonly style="color:var(--gl);background:var(--s3)"></div><div class="fg w100"><label>Projekt</label><select id="a-projekt" onchange="onARProjektChange()">'+projektOpts('')+'</select></div><div class="fg w50"><label>Qualifikation</label><input type="text" id="a-qual" readonly style="background:var(--s3);color:var(--m)"></div><div class="fg w50"><label>Wetter</label><select id="a-wetter"><option>Sonnig</option><option>Bewoelkt</option><option>Regen</option><option>Frost</option><option>Sturm</option></select></div></div></div>'+
    '<div class="qsec"><div class="qsec-t">Taetigkeiten</div><div class="tags" id="ar-taetigkeiten-tags">'+taetigkeitenTags([])+'</div></div>'+
    '<div class="qsec"><div class="qsec-t">Arbeitszeiten</div><div class="row"><div class="fg w25"><label>Beginn</label><input type="time" id="a-von" value="07:00" oninput="calcAR()"></div><div class="fg w25"><label>Ende</label><input type="time" id="a-bis" value="16:00" oninput="calcAR()"></div><div class="fg w25"><label>Pause</label><select id="a-pause" onchange="calcAR()">'+PAUSEN.map(p=>'<option value="'+p+'" '+(p===30?'selected':'')+'>'+p+' min</option>').join('')+'</select></div><div class="fg w25"><label>Netto Arbeit</label><input type="text" id="a-netto-work" readonly style="color:var(--gl);font-weight:700;font-family:\'IBM Plex Mono\',monospace"></div></div>'+
    '<div class="row"><div class="fg w50"><label>Fahrzeit</label><input type="text" id="a-fahrzeit-anzeige" readonly style="color:var(--earth);font-family:\'IBM Plex Mono\',monospace;font-size:11px"></div><div class="fg w50"><label>Fahrt-Status</label><div style="display:flex;gap:5px;margin-top:4px"><button type="button" class="fahrt-btn fahrt-active" data-val="fahrer" onclick="setFahrt(this)">Fahrer<br><span style="font-size:9px;opacity:.7">100%</span></button><button type="button" class="fahrt-btn" data-val="beifahrer" onclick="setFahrt(this)">Beifahrer<br><span style="font-size:9px;opacity:.7">50%</span></button><button type="button" class="fahrt-btn" data-val="privat" onclick="setFahrt(this)">Privat<br><span style="font-size:9px;opacity:.7">0%</span></button></div></div></div>'+
    '<div class="fg" style="margin-top:4px"><label>Netto gesamt</label><input type="text" id="a-netto" readonly style="color:var(--gl);font-weight:700;font-family:\'IBM Plex Mono\',monospace;font-size:18px"></div>'+
    '<div id="fahrzeit-info" style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:var(--m);margin-top:3px;min-height:14px"></div></div>'+
    '<div class="qsec"><div class="qsec-t">Details</div><textarea id="a-taetigkeit" placeholder="Details..." style="min-height:60px"></textarea>'+mkMic('a-taetigkeit','Details')+'<div style="margin-top:8px"><input type="text" id="a-besonder" placeholder="Besonderheiten...">'+mkMic('a-besonder','Besonderheiten')+'</div></div>'+
    '<div class="send-status" id="ar-send-status"></div>'+
    '<div class="arow"><button class="btn btn-p" onclick="saveAndSendAR()">Speichern und PDF senden</button><button class="btn" onclick="clearARForm()">Neu</button></div>';
}
function initARForm(){const n=document.getElementById('a-name');if(n)n.value=currentUser.name;const q=document.getElementById('a-qual');if(q)q.value=currentUser.qualifikation||'Facharbeiter GaLa';const d=document.getElementById('a-datum');if(d)d.value=todayStr();calcAR();}
function onARProjektChange(){const sel=document.getElementById('a-projekt');if(!sel)return;const fz=getProjektFahrzeit(sel.value);const a=document.getElementById('a-fahrzeit-anzeige');if(a)a.value=fz>0?fz+' min':'0 min';calcAR();}
function calcAR(){const v=document.getElementById('a-von')?.value,b=document.getElementById('a-bis')?.value,p=parseFloat(document.getElementById('a-pause')?.value)||0;const sel=document.getElementById('a-projekt');const fmin=sel?getProjektFahrzeit(sel.value):0;if(v&&b){const[vh,vm]=v.split(':').map(Number),[bh,bm]=b.split(':').map(Number);let wm=(bh*60+bm)-(vh*60+vm)-p;if(wm<0)wm+=1440;const wh=wm/60;const nw=document.getElementById('a-netto-work');if(nw)nw.value=wh.toFixed(2).replace('.',',');const satz={'fahrer':1.0,'beifahrer':0.5,'privat':0.0}[curFahrtStatus]??1.0;const fh=(fmin/60)*satz;const tot=wh+fh;const nt=document.getElementById('a-netto');if(nt)nt.value=tot.toFixed(2).replace('.',',');const info=document.getElementById('fahrzeit-info');if(info&&fmin>0){const lbl={'fahrer':'100%','beifahrer':'50%','privat':'0%'}[curFahrtStatus];info.textContent='Fahrzeit: '+fmin+'min x '+lbl+' = '+fh.toFixed(2).replace('.',',')+'h';}else if(info)info.textContent='';}}
function clearARForm(){currentId=null;stopVoice();const d=document.getElementById('a-datum');if(d)d.value=todayStr();const pr=document.getElementById('a-projekt');if(pr)pr.value='';const v=document.getElementById('a-von');if(v)v.value='07:00';const bs=document.getElementById('a-bis');if(bs)bs.value='16:00';const ps=document.getElementById('a-pause');if(ps)ps.value='30';['a-netto-work','a-netto','a-taetigkeit','a-besonder'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});curFahrtStatus='fahrer';document.querySelectorAll('.fahrt-btn').forEach(b=>{b.classList.remove('fahrt-active');if(b.dataset.val==='fahrer')b.classList.add('fahrt-active');});document.querySelectorAll('#ar-taetigkeiten-tags .tg').forEach(t=>t.classList.remove('a'));const st=document.getElementById('ar-send-status');if(st){st.className='send-status';st.textContent='';}toast('Neuer Bericht','ok');}

// VA FORMS
function buildVABericht(){
  return'<div class="sec"><div class="sh">Grunddaten</div><div class="row"><div class="fg w25"><label>Datum</label><input type="date" id="v-datum"></div><div class="fg w25"><label>Projektnr.</label><input type="text" id="v-projektnr" placeholder="intern"></div><div class="fg w25"><label>Bauleiter</label><input type="text" id="v-bauleiter" placeholder="Name"></div><div class="fg w25"><label>Temperatur</label><input type="number" id="v-temp" placeholder="18"></div><div class="fg w100"><label>Hauptprojekt</label><select id="v-projekt" onchange="onVAProjektChange()">'+projektOpts('')+'</select></div><div class="fg w50"><label>Bereich</label><input type="text" id="v-baustelle" placeholder="Bereich...">'+mkMic('v-baustelle','Baustelle')+'</div><div class="fg w50"><label>Bauherr</label><input type="text" id="v-bauherr" placeholder="Gemeinde...">'+mkMic('v-bauherr','Bauherr')+'</div><div class="fg w33"><label>Niederschlag mm</label><input type="number" id="v-nied" placeholder="0"></div><div class="fg w33"><label>Besucher</label><input type="text" id="v-besucher"></div><div class="fg w33"><label>Boden</label><select id="v-boden"><option>Trocken</option><option>Feucht</option><option>Nass</option><option>Gefroren</option></select></div></div>'+
    '<div class="wrow"><div class="wc s" onclick="selW(this,\'Sonnig\')">Sonnig</div><div class="wc" onclick="selW(this,\'Bewoelkt\')">Bewoelkt</div><div class="wc" onclick="selW(this,\'Regen\')">Regen</div><div class="wc" onclick="selW(this,\'Frost/Eis\')">Frost</div><div class="wc" onclick="selW(this,\'Sturm\')">Sturm</div><div class="wc" onclick="selW(this,\'Schnee\')">Schnee</div></div>'+
    '<div id="zusatz-proj-wrap"></div><button class="btn btn-e" style="margin-top:8px;font-size:11px" onclick="addZusatzProjekt()">+ Weitere Baustelle</button></div>'+
    '<div class="sec"><div class="sh">Taetigkeiten</div><div class="tags" id="va-taetigkeiten-tags">'+taetigkeitenTags([])+'</div></div>'+
    '<div class="sec"><div class="sh">Fotos (max. 5)</div><input type="file" id="v-fotos-input" accept="image/*" multiple style="display:none" onchange="handleFotos(this)"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><button class="btn btn-e" onclick="document.getElementById(\'v-fotos-input\').click()">Fotos</button><span style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:var(--m)" id="v-fotos-count">Keine Fotos</span></div><div class="foto-prev-wrap" id="v-fotos-preview"></div></div>'+
    '<div class="sec"><div class="sh">Arbeitsschritte</div><div id="steps-con"></div><button class="btn" onclick="addStep()">+ Schritt</button></div>'+
    '<div class="sec"><div class="sh">Maengel</div><div id="mangel-con"></div><button class="btn btn-r" style="font-size:11px" onclick="addMangel()">+ Mangel</button><div class="fg" style="margin-top:10px"><label>Naechste Schritte</label><textarea id="v-naechstes"></textarea>'+mkMic('v-naechstes','Naechste Schritte')+'</div><div class="fg" style="margin-top:8px"><label>Bemerkungen</label><textarea id="v-bemerkungen"></textarea>'+mkMic('v-bemerkungen','Bemerkungen')+'</div></div>'+
    '<div class="send-status" id="va-send-status"></div>'+
    '<div class="arow"><button class="btn btn-p" onclick="saveAndSendVA()">Speichern und PDF senden</button><button class="btn" style="background:var(--gg);border-color:var(--gd);color:var(--gl)" onclick="triggerAI()">KI</button><button class="btn" onclick="newReport()">Neu</button></div>';
}
function onVAProjektChange(){const sel=document.getElementById('v-projekt');if(!sel||!sel.value)return;const fz=getProjektFahrzeit(sel.value);document.querySelectorAll('#zeit-body tr').forEach(tr=>{const prSel=tr.querySelector('.row-pr');if(prSel&&!prSel.value)prSel.value=sel.value;const fzEl=tr.querySelector('.zeit-fahrzeit');if(fzEl&&fz>0&&(fzEl.value==='0'||fzEl.value===''))fzEl.value=fz;const vonEl=tr.querySelector('.zeit-von');if(vonEl)calcZR(vonEl);});toast('Projekt + Fahrzeit uebernommen','ok');}
function addZusatzProjekt(){zusatzProjektIdx++;const i=zusatzProjektIdx;const wrap=document.getElementById('zusatz-proj-wrap');if(!wrap)return;const div=document.createElement('div');div.className='zusatz-projekt-block';div.id='zusatz-'+i;div.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:var(--earth)">WEITERE BAUSTELLE '+i+'</div><button class="delbtn" style="color:var(--r)" onclick="document.getElementById(\'zusatz-'+i+'\').remove()">&#x2715;</button></div><div class="row"><div class="fg w100"><label>Projekt</label><select id="zusatz-proj-'+i+'">'+projektOpts('')+'</select></div><div class="fg w50"><label>Bereich</label><input type="text" id="zusatz-baustelle-'+i+'"></div><div class="fg w50"><label>Bauherr</label><input type="text" id="zusatz-bauherr-'+i+'"></div></div>';wrap.appendChild(div);}
function getZusatzProjekte(){const result=[];document.querySelectorAll('[id^="zusatz-"]').forEach(block=>{const i=block.id.replace('zusatz-','');const projSel=document.getElementById('zusatz-proj-'+i);if(projSel?.value){const proj=PROJEKTE.find(p=>p.id===projSel.value);result.push({projektId:projSel.value,projektNr:proj?.nr||'',projektName:proj?.name||'',baustelle:document.getElementById('zusatz-baustelle-'+i)?.value||'',bauherr:document.getElementById('zusatz-bauherr-'+i)?.value||''});}});return result;}

function buildVAZeit(){return'<div class="sec"><div class="sh">Personal-Zeiterfassung <span id="zeit-total" style="margin-left:auto;color:var(--gl);font-family:\'IBM Plex Mono\',monospace;font-size:10px">0,0h</span></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Name</th><th>Qual.</th><th>Von</th><th>Bis</th><th>Pause</th><th>Arbeit</th><th>Fahrt</th><th>Fahrzeit</th><th>Anteil</th><th>GESAMT</th><th>Projekt</th><th>Taetigkeit</th><th></th></tr></thead><tbody id="zeit-body"></tbody></table></div><button class="btn" onclick="addZeitRow()">+ Person</button></div><div class="sec"><div class="sh">Geraeteeinsatz</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Geraet</th><th>Kfz/Nr.</th><th>Stunden</th><th>Projekt</th><th></th></tr></thead><tbody id="mach-body"></tbody></table></div><button class="btn" onclick="addMachRow()">+ Geraet</button></div><div class="arow"><button class="btn btn-p" onclick="saveAndSendVA()">Speichern und PDF senden</button></div>';}
function buildVAMaterial(){return'<div class="sec"><div class="sh">Materiallieferungen</div><div id="lief-con"></div><button class="btn btn-e" onclick="addLief()">+ Lieferung</button></div><div class="sec"><div class="sh">Mengennachweise</div><div id="mengen-con"></div><button class="btn" onclick="addMenge()">+ Menge</button></div><div class="arow"><button class="btn btn-p" onclick="saveAndSendVA()">Speichern und PDF senden</button></div>';}
function buildKI(){return'<div class="sh">KI-Analyse</div><div class="ai-acts"><button class="ai-ab" onclick="runAI(\'zusammenfassung\')">Zusammenfassung</button><button class="ai-ab" onclick="runAI(\'risiken\')">Risiken</button><button class="ai-ab" onclick="runAI(\'qualitaet\')">Qualitaet</button><button class="ai-ab" onclick="runAI(\'plan\')">Wochenplan</button></div><div id="ki-out"><div class="empty"><div class="ei">&#127807;</div><div class="et">Bericht laden und analysieren</div></div></div>';}

function addZeitRow(data={}){const tbody=document.getElementById('zeit-body');if(!tbody)return;const tr=document.createElement('tr');const hp=document.getElementById('v-projekt')?.value||'';const autoFz=getProjektFahrzeit(hp);const fzVal=data.fahrzeitMin!==undefined?parseInt(data.fahrzeitMin):autoFz;const autoProj=data.projektId||hp||'';const prOpts='<option value="">-</option>'+PROJEKTE.map(p=>'<option value="'+p.id+'" '+(autoProj===p.id?'selected':'')+'>'+p.nr+'</option>').join('');const taeOpts='<option value="">-</option>'+TAETIGKEITEN.map(t=>'<option value="'+t+'" '+(data.tae===t?'selected':'')+'>'+t+'</option>').join('');tr.innerHTML='<td><input class="zeit-name" type="text" value="'+(data.name||'')+'" placeholder="Name" style="min-width:80px" oninput="refreshStepMAs()"></td><td><select class="zeit-qual" style="font-size:10px">'+['VA','Facharbeiter','Helfer','Azubi','Sub'].map(q=>'<option'+(data.qual===q?' selected':'')+'>'+q+'</option>').join('')+'</select></td><td><input class="zeit-von" type="time" value="'+(data.von||'07:00')+'" style="width:76px" oninput="calcZR(this)"></td><td><input class="zeit-bis" type="time" value="'+(data.bis||'16:00')+'" style="width:76px" oninput="calcZR(this)"></td><td>'+pausenSelect(data.pause||30,'zeit-pause')+'</td><td><input class="zeit-netto" type="text" readonly value="'+(data.nettoArbeit||'')+'" style="width:52px;color:var(--gl);font-family:\'IBM Plex Mono\',monospace;font-weight:600"></td><td><select class="fahrt-sel" style="font-size:10px" onchange="calcZR(this)"><option value="fahrer" '+(data.fahrt==='fahrer'||!data.fahrt?'selected':'')+'>Fahrer</option><option value="beifahrer" '+(data.fahrt==='beifahrer'?'selected':'')+'>Beifahrer</option><option value="privat" '+(data.fahrt==='privat'?'selected':'')+'>Privat</option></select></td><td><input class="zeit-fahrzeit" type="number" value="'+fzVal+'" min="0" style="width:60px;background:var(--s2);border:1px solid var(--b);border-radius:3px;padding:3px 6px;color:var(--earth);font-family:\'IBM Plex Mono\',monospace" oninput="calcZR(this)"></td><td><input class="zeit-anteil" type="text" readonly value="'+(data.fahrtAnteil||'')+'" style="width:48px;color:var(--earth);font-family:\'IBM Plex Mono\',monospace;font-weight:600"></td><td><input class="zeit-gesamt" type="text" readonly value="'+(data.gesamt||'')+'" style="width:56px;color:var(--gl);font-family:\'IBM Plex Mono\',monospace;font-weight:700;font-size:12px"></td><td><select class="row-pr" style="font-size:9px;min-width:90px" onchange="onZeitProjektChange(this)">'+prOpts+'</select></td><td><select class="row-tae" style="font-size:9px;min-width:110px">'+taeOpts+'</select></td><td><button class="delbtn" onclick="this.closest(\'tr\').remove();updZeitTotal();refreshStepMAs()">&#x2715;</button></td>';tbody.appendChild(tr);calcZR(tr.querySelector('.zeit-von'));setTimeout(refreshStepMAs,50);}
function onZeitProjektChange(sel){const tr=sel.closest('tr');if(!tr)return;const fz=getProjektFahrzeit(sel.value);const fzEl=tr.querySelector('.zeit-fahrzeit');if(fzEl&&fz>0)fzEl.value=fz;calcZR(tr.querySelector('.zeit-von'));}
function calcZR(inp){if(!inp)return;const tr=inp.closest('tr');if(!tr)return;const von=tr.querySelector('.zeit-von')?.value||'',bis=tr.querySelector('.zeit-bis')?.value||'';const pause=parseFloat(tr.querySelector('.zeit-pause')?.value)||0;const fahrzeitMin=parseFloat(tr.querySelector('.zeit-fahrzeit')?.value)||0;const fahrtVal=tr.querySelector('.fahrt-sel')?.value||'fahrer';if(von&&bis){const[vh,vm]=von.split(':').map(Number),[bh,bm]=bis.split(':').map(Number);let am=(bh*60+bm)-(vh*60+vm)-pause;if(am<0)am+=1440;const ah=am/60;const ne=tr.querySelector('.zeit-netto');if(ne)ne.value=ah.toFixed(2).replace('.',',');const satz={'fahrer':1.0,'beifahrer':0.5,'privat':0.0}[fahrtVal]??1.0;const fh=(fahrzeitMin/60)*satz;const ae=tr.querySelector('.zeit-anteil');if(ae)ae.value=fh.toFixed(2).replace('.',',');const ge=tr.querySelector('.zeit-gesamt');if(ge)ge.value=(ah+fh).toFixed(2).replace('.',',');}updZeitTotal();}
function updZeitTotal(){let t=0;document.querySelectorAll('.zeit-gesamt').forEach(e=>t+=parseFloat(e.value.replace(',','.'))||0);const el=document.getElementById('zeit-total');if(el)el.textContent=t.toFixed(2).replace('.',',')+'h';}
function getZeitRowsSimple(){return[...document.querySelectorAll('#zeit-body tr')].map(tr=>({name:tr.querySelector('.zeit-name')?.value||'',qual:tr.querySelector('.zeit-qual')?.value||''})).filter(r=>r.name);}
function getZeitRows(){return[...document.querySelectorAll('#zeit-body tr')].map(tr=>({name:tr.querySelector('.zeit-name')?.value||'',qual:tr.querySelector('.zeit-qual')?.value||'',von:tr.querySelector('.zeit-von')?.value||'',bis:tr.querySelector('.zeit-bis')?.value||'',pause:tr.querySelector('.zeit-pause')?.value||'30',nettoArbeit:tr.querySelector('.zeit-netto')?.value||'',fahrt:tr.querySelector('.fahrt-sel')?.value||'fahrer',fahrzeitMin:tr.querySelector('.zeit-fahrzeit')?.value||'0',fahrtAnteil:tr.querySelector('.zeit-anteil')?.value||'',gesamt:tr.querySelector('.zeit-gesamt')?.value||'',projektNr:PROJEKTE.find(p=>p.id===tr.querySelector('.row-pr')?.value)?.nr||'',projektId:tr.querySelector('.row-pr')?.value||'',tae:tr.querySelector('.row-tae')?.value||''})).filter(r=>r.name);}
function addMachRow(data={}){const tbody=document.getElementById('mach-body');if(!tbody)return;const tr=document.createElement('tr');const prOpts='<option value="">-</option>'+PROJEKTE.map(p=>'<option value="'+p.id+'" '+(data.projektId===p.id?'selected':'')+'>'+p.nr+'</option>').join('');tr.innerHTML='<td><select class="geraet-sel" style="font-size:10px;min-width:180px"><option value="">- Geraet -</option>'+GERAETE.map(g=>'<option value="'+g.nr+'" '+(data.geraetNr===g.nr?'selected':'')+'>'+g.nr+' - '+g.bez+'</option>').join('')+'</select></td><td><input type="text" class="mach-fzn" value="'+(data.fahrzeugnr||'')+'" placeholder="Kfz" style="width:80px"></td><td><input type="number" class="mach-std" value="'+(data.netto||'')+'" placeholder="Std" min="0" step="0.5" style="width:70px;color:var(--gl);font-family:\'IBM Plex Mono\',monospace;font-weight:700"></td><td><select class="row-pr" style="font-size:9px;min-width:90px">'+prOpts+'</select></td><td><button class="delbtn" onclick="this.closest(\'tr\').remove()">&#x2715;</button></td>';tbody.appendChild(tr);}
function getMachRows(){return[...document.querySelectorAll('#mach-body tr')].map(tr=>{const geraetNr=tr.querySelector('.geraet-sel')?.value||'';const geraet=GERAETE.find(g=>g.nr===geraetNr);return{geraetNr,geraetBez:geraet?.bez||'',fahrzeugnr:tr.querySelector('.mach-fzn')?.value||'',netto:tr.querySelector('.mach-std')?.value||'',projektId:tr.querySelector('.row-pr')?.value||''};}).filter(r=>r.geraetNr);}
function addStep(data={}){stepIdx++;const i=stepIdx;const maRows=getZeitRowsSimple();let maHtml=maRows.length>0?'<div class="ma-zuweisung"><div class="ma-zuw-title">Mitarbeiter zuweisen</div>'+maRows.map(ma=>{const checked=(data.mitarbeiter||[]).some(m=>m.name===ma.name);const std=(data.mitarbeiter||[]).find(m=>m.name===ma.name)?.stunden||'';return'<div class="ma-check-row"><input type="checkbox" class="ma-cb" data-name="'+ma.name+'" '+(checked?'checked':'')+' onchange="updateStepMA('+i+')"><span class="ma-name-lbl">'+ma.name+'</span><input type="number" class="ma-h" data-name="'+ma.name+'" value="'+std+'" placeholder="Std" min="0" step="0.5" style="opacity:'+(checked?'1':'0.4')+'"></div>';}).join('')+'</div>':'<div style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:var(--m);margin-top:6px" data-no-ma="1">Erst Mitarbeiter im Tab Zeiten eintragen</div>';const div=document.createElement('div');div.className='lief-block';div.id='step-'+i;div.innerHTML='<div class="lief-head"><div class="lief-num">'+i+'</div><select style="flex:0 0 160px;font-size:10px;background:var(--s3);border:1px solid var(--b);border-radius:3px;padding:3px 6px;color:var(--t)" id="st-pr-'+i+'"><option value="">- Projekt -</option>'+PROJEKTE.map(p=>'<option value="'+p.id+'" '+(data.projektId===p.id?'selected':'')+'>'+p.nr+'</option>').join('')+'</select><input type="text" id="st-pos-'+i+'" placeholder="LV-Pos." style="flex:0 0 70px;font-size:10px" value="'+(data.pos||'')+'"><button class="delbtn" style="margin-left:auto" onclick="document.getElementById(\'step-'+i+'\').remove()">&#x2715;</button></div><textarea id="st-txt-'+i+'" style="min-height:60px;margin-bottom:4px" placeholder="Taetigkeit...">'+(data.txt||'')+'</textarea>'+mkMic('st-txt-'+i,'Schritt '+i)+'<div style="display:flex;gap:6px;margin-top:8px"><div class="fg"><label>Menge</label><input type="text" id="st-mg-'+i+'" value="'+(data.menge||'')+'" placeholder="200 m2"></div><div class="fg"><label>Einheit</label><input type="text" id="st-eh-'+i+'" value="'+(data.eh||'')+'" placeholder="m2"></div></div>'+maHtml;document.getElementById('steps-con')?.appendChild(div);}
function updateStepMA(idx){const block=document.getElementById('step-'+idx);if(!block)return;block.querySelectorAll('.ma-cb').forEach(cb=>{const h=block.querySelector('.ma-h[data-name="'+cb.dataset.name+'"]');if(h)h.style.opacity=cb.checked?'1':'0.4';});}
function refreshStepMAs(){const blocks=document.querySelectorAll('[id^="step-"]');if(!blocks.length)return;const maRows=getZeitRowsSimple();blocks.forEach(block=>{if(!block.id.match(/^step-\d+$/))return;const idx=block.id.replace('step-','');let zone=block.querySelector('.ma-zuweisung');const noMA=block.querySelector('[data-no-ma]');const checked={};block.querySelectorAll('.ma-cb').forEach(cb=>{checked[cb.dataset.name]=cb.checked;});const stunden={};block.querySelectorAll('.ma-h').forEach(h=>{stunden[h.dataset.name]=h.value;});if(maRows.length===0){if(zone)zone.remove();if(!noMA){const msg=document.createElement('div');msg.setAttribute('data-no-ma','1');msg.style.cssText='font-family:monospace;font-size:9px;color:var(--m);margin-top:6px';msg.textContent='Erst Mitarbeiter im Tab Zeiten eintragen';block.appendChild(msg);}return;}if(noMA)noMA.remove();if(!zone){zone=document.createElement('div');zone.className='ma-zuweisung';block.appendChild(zone);}zone.innerHTML='<div class="ma-zuw-title">Mitarbeiter zuweisen</div>'+maRows.map(ma=>{const ic=checked[ma.name]||false;const h=stunden[ma.name]||'';return'<div class="ma-check-row"><input type="checkbox" class="ma-cb" data-name="'+ma.name+'" '+(ic?'checked':'')+' onchange="updateStepMA('+idx+')"><span class="ma-name-lbl">'+ma.name+'</span><input type="number" class="ma-h" data-name="'+ma.name+'" value="'+h+'" placeholder="Std" min="0" step="0.5" style="opacity:'+(ic?'1':'0.4')+'"></div>';}).join('');});}
function getStepMAs(idx){const block=document.getElementById('step-'+idx);if(!block)return[];const result=[];block.querySelectorAll('.ma-cb:checked').forEach(cb=>{const h=block.querySelector('.ma-h[data-name="'+cb.dataset.name+'"]');result.push({name:cb.dataset.name,stunden:h?.value||''});});return result;}
function getSteps(){return[...document.querySelectorAll('[id^="step-"]')].filter(b=>b.id.match(/^step-\d+$/)).map(b=>{const i=b.id.replace('step-','');const pid=b.querySelector('#st-pr-'+i)?.value||'';return{txt:b.querySelector('#st-txt-'+i)?.value||'',projektId:pid,projektNr:PROJEKTE.find(p=>p.id===pid)?.nr||'',pos:b.querySelector('#st-pos-'+i)?.value||'',menge:b.querySelector('#st-mg-'+i)?.value||'',eh:b.querySelector('#st-eh-'+i)?.value||'',mitarbeiter:getStepMAs(i)};}).filter(s=>s.txt);}
function addLief(data={}){liefIdx++;const i=liefIdx;const div=document.createElement('div');div.className='lief-block';div.innerHTML='<div class="lief-head"><div class="lief-num">'+i+'</div><button class="delbtn" style="margin-left:auto" onclick="this.closest(\'.lief-block\').remove()">&#x2715;</button></div><div class="row"><div class="fg w50"><label>Lieferant</label><input type="text" id="lf-firma-'+i+'" value="'+(data.firma||'')+'"></div><div class="fg w50"><label>Lieferschein</label><input type="text" id="lf-ls-'+i+'" value="'+(data.ls||'')+'"></div><div class="fg w50"><label>Material</label><input type="text" id="lf-mat-'+i+'"></div><div class="fg w25"><label>Menge</label><input type="number" id="lf-mg-'+i+'" value="'+(data.menge||'')+'"></div><div class="fg w25"><label>Einheit</label><select id="lf-eh-'+i+'"><option>m2</option><option>m3</option><option>t</option><option>lfm</option><option>Stk</option></select></div></div>';document.getElementById('lief-con')?.appendChild(div);}
function getLiefData(){return[...document.querySelectorAll('#lief-con .lief-block')].map((b,i)=>{const n=i+1;return{firma:b.querySelector('#lf-firma-'+n)?.value,ls:b.querySelector('#lf-ls-'+n)?.value,mat:b.querySelector('#lf-mat-'+n)?.value,menge:b.querySelector('#lf-mg-'+n)?.value,eh:b.querySelector('#lf-eh-'+n)?.value};}).filter(l=>l.firma||l.mat);}
function addMenge(data={}){const div=document.createElement('div');div.className='lief-block';div.style.padding='8px';div.innerHTML='<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap"><input type="text" placeholder="Bezeichnung" value="'+(data.bez||'')+'" style="flex:2;min-width:100px"><input type="number" placeholder="Menge" value="'+(data.menge||'')+'" style="flex:0 0 75px"><select style="flex:0 0 65px;font-size:10px"><option>m2</option><option>m3</option><option>t</option><option>lfm</option><option>Stk</option></select><button class="delbtn" onclick="this.closest(\'.lief-block\').remove()">&#x2715;</button></div>';document.getElementById('mengen-con')?.appendChild(div);}
function getMengen(){return[...document.querySelectorAll('#mengen-con .lief-block')].map(b=>{const is=b.querySelectorAll('input'),se=b.querySelector('select');return{bez:is[0]?.value,menge:is[1]?.value,eh:se?.value};}).filter(m=>m.bez);}

function buildKalender(){const el=document.getElementById('kalender-content');if(!el)return;const heute=new Date(),firstDay=new Date(kalJahr,kalMonat,1),lastDay=new Date(kalJahr,kalMonat+1,0);const startWd=(firstDay.getDay()+6)%7;const MONATE=['Januar','Februar','Maerz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];const bm={};reports.forEach(r=>{if(!r.datum)return;const d=new Date(r.datum);if(d.getMonth()!==kalMonat||d.getFullYear()!==kalJahr)return;bm[r.datum]=(bm[r.datum]||0)+1;});let html='<div class="kalender-wrap"><div class="kal-header"><button class="kal-nav" onclick="kalPrev()">&#x276E;</button><div class="kal-monat">'+MONATE[kalMonat]+' '+kalJahr+'</div><button class="kal-nav" onclick="kalNext()">&#x276F;</button></div><div class="kal-grid">';['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(wt=>html+='<div class="kal-wt">'+wt+'</div>');for(let i=0;i<startWd;i++)html+='<div class="kal-day leer"></div>';for(let tag=1;tag<=lastDay.getDate();tag++){const datum=kalJahr+'-'+String(kalMonat+1).padStart(2,'0')+'-'+String(tag).padStart(2,'0');const dd=new Date(kalJahr,kalMonat,tag);const wd=dd.getDay();const isWE=(wd===0||wd===6),isFuture=dd>heute,isHeute=datum===todayStr(),hat=bm[datum]>0;let cls='kal-day';if(isHeute)cls+=' heute';if(isWE)cls+=' we';else if(isFuture)cls+=' zukunft';else if(hat)cls+=' ok';else cls+=' fehlt';html+='<div class="'+cls+'">'+tag+'</div>';}html+='</div></div>';el.innerHTML=html;}
function kalPrev(){kalMonat--;if(kalMonat<0){kalMonat=11;kalJahr--;}buildKalender();}
function kalNext(){kalMonat++;if(kalMonat>11){kalMonat=0;kalJahr++;}buildKalender();}

function showTab(name){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('act'));const t=document.getElementById('tab-'+name),p=document.getElementById('panel-'+name);if(t)t.classList.add('act');if(p)p.classList.add('act');if(name==='bericht')setTimeout(refreshStepMAs,100);if(name==='kalender'){kalMonat=new Date().getMonth();kalJahr=new Date().getFullYear();buildKalender();}if(name==='fzliste')buildFZListe();stopVoice();}

async function sendPDFMail(report,statusElId){
  const statusEl=document.getElementById(statusElId);
  if(statusEl){statusEl.className='send-status show sending';statusEl.textContent='PDF wird erstellt...';}
  try{
    const doc=await generatePDF(report);
    const pdfBase64=doc.output('datauristring').split(',')[1];
    const pLabel=getProjektLabel(report.projekt_id||report.projektNr||'');
    const netto=String(report.netto||report.netto_gesamt_h||report.netto_arbeit_h||'0');
    const{to,cc}=await getActiveEmpfaenger();
    const payload={empfaenger:to.join(','),cc:cc.join(','),betreff:'KLEI Tagesbericht '+fmtD(report.datum)+' - '+(report.role==='ar'||report.role==='ws'?report.name||report.mitarbeiter_name:pLabel),rolle:report.role||'ar',name:report.name||report.mitarbeiter_name||'',datum:report.datum,baustelle:pLabel+(report.baustelle?' - '+report.baustelle:''),auftrag:pLabel,netto,wetter:report.wetter||'',maNr:currentUser?.mitarbeiter_nr||'',pdfBase64};
    const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)});
    const txt=await res.text();
    let driveUrl='';try{const j=JSON.parse(txt);driveUrl=j.driveUrl||'';}catch(e){}
    if(res.ok&&(txt.includes('OK')||txt.includes('status'))){if(statusEl){statusEl.className='send-status show ok';statusEl.textContent='PDF gesendet! '+(driveUrl?'Drive ✓':'');}toast('PDF gesendet!','ok');return driveUrl;}
    else throw new Error(txt||'Fehler');
  }catch(e){if(statusEl){statusEl.className='send-status show err';statusEl.textContent='Fehler: '+e.message;}try{const doc=await generatePDF(report);doc.save(buildPDFName(report));}catch(e2){}toast('PDF lokal gespeichert','err');return null;}
}

  const el=document.getElementById('mpanel-dashboard');el.innerHTML='<div style="color:#666;font-size:10px;padding:8px">Lade...</div>';
  const heute=new Date().toISOString().split('T')[0];const monatsStart=heute.substring(0,7)+'-01';
  const[bRes,maRes]=await Promise.all([sb.from('berichte').select('*').gte('datum',monatsStart).order('datum',{ascending:false}),sb.from('mitarbeiter').select('*').eq('aktiv',true)]);
  const b=bRes.data||[],ma=maRes.data||[];
  const heuteB=b.filter(x=>x.datum===heute);const totalH=b.reduce((s,x)=>s+(parseFloat(x.netto_gesamt_h||x.netto_arbeit_h||0)),0);
  const arbMA=ma.filter(m=>['arbeiter','vorarbeiter','werkstatt'].includes(m.rolle));const maMitBericht=new Set(heuteB.map(x=>x.mitarbeiter_id));const fehlend=arbMA.filter(m=>!maMitBericht.has(m.id));
  el.innerHTML='<div class="kpi-grid"><div class="kpi-card"><div class="kpi-val">'+b.length+'</div><div class="kpi-lbl">Berichte/Monat</div><div class="kpi-sub">'+heuteB.length+' heute</div></div><div class="kpi-card"><div class="kpi-val">'+totalH.toFixed(0)+'h</div><div class="kpi-lbl">Stunden/Monat</div></div><div class="kpi-card"><div class="kpi-val" style="color:'+(fehlend.length?'var(--r)':'var(--gl)')+'">'+fehlend.length+'</div><div class="kpi-lbl">Fehlend heute</div></div><div class="kpi-card"><div class="kpi-val">'+arbMA.length+'</div><div class="kpi-lbl">Mitarbeiter</div></div></div>'+
    '<div class="m-sec"><div class="m-sec-title">Hinweise</div>'+(fehlend.length?fehlend.map(m=>'<div class="alert-item warn"><span style="color:var(--o)">&#x26A0;</span><div style="font-size:12px;color:#ddd">Kein Bericht: '+m.name+'</div></div>').join(''):'<div class="alert-item ok"><span style="color:var(--g)">✓</span><div style="font-size:12px;color:#ddd">Alle haben heute Bericht abgegeben</div></div>')+'</div>'+
    '<div class="m-sec"><div class="m-sec-title">Letzte Berichte</div>'+b.slice(0,8).map(x=>'<div style="display:flex;justify-content:space-between;padding:8px;background:#1a1a2e;border-radius:var(--rad);margin-bottom:4px"><div><div style="font-size:12px;color:#ddd;font-weight:600">'+x.mitarbeiter_name+'</div><div style="font-family:monospace;font-size:9px;color:#666">'+fmtD(x.datum)+' · '+x.projekt_nr+'</div></div><div style="font-family:monospace;font-size:11px;color:var(--gold)">'+(parseFloat(x.netto_gesamt_h||x.netto_arbeit_h||0)).toFixed(1)+'h</div></div>').join('')+'</div>';
}

async function renderMasterMitarbeiter(){
  const el=document.getElementById('mpanel-mitarbeiter');el.innerHTML='<div style="color:#666;font-size:10px;padding:8px">Lade...</div>';
  const heute=new Date();const monatsStart=heute.toISOString().substring(0,7)+'-01';
  const werktage=[];for(let d=1;d<=heute.getDate();d++){const dd=new Date(heute.getFullYear(),heute.getMonth(),d);if(dd.getDay()!==0&&dd.getDay()!==6)werktage.push(dd.toISOString().split('T')[0]);}
  const[maRes,bRes]=await Promise.all([sb.from('mitarbeiter').select('*').eq('aktiv',true).order('name'),sb.from('berichte').select('*').gte('datum',monatsStart)]);
  const allMA=maRes.data||[],allB=bRes.data||[];const arbMA=allMA.filter(m=>['arbeiter','vorarbeiter','werkstatt'].includes(m.rolle));
  const stats=arbMA.map(m=>{const mb=allB.filter(b=>b.mitarbeiter_id===m.id);const mh=mb.reduce((s,b)=>s+(parseFloat(b.netto_gesamt_h||b.netto_arbeit_h||0)),0);const tage=new Set(mb.map(b=>b.datum)).size;const anw=werktage.length?(tage/werktage.length)*100:0;let score='A';if(anw<60)score='D';else if(anw<75)score='C';else if(anw<90)score='B';return{...m,mh,tage,anw,score};}).sort((a,b)=>b.anw-a.anw);
  el.innerHTML='<div class="m-sec"><div class="m-sec-title">Mitarbeiter-Analyse</div>'+stats.map(m=>{const fc=m.anw>=90?'ok':m.anw>=75?'warn':'err';return'<div class="ma-row"><div class="ma-score score-'+m.score.toLowerCase()+'">'+m.score+'</div><div style="flex:1;min-width:120px"><div style="font-size:12px;font-weight:600;color:#ddd">'+m.name+'</div><div style="font-family:monospace;font-size:9px;color:#666">'+m.qualifikation+' · '+m.tage+' Tage · '+m.mh.toFixed(1)+'h</div><div class="progress-bar" style="margin-top:4px"><div class="progress-fill '+fc+'" style="width:'+Math.min(m.anw,100)+'%"></div></div></div><div style="font-family:monospace;font-size:12px;color:var(--gold)">'+m.anw.toFixed(0)+'%</div></div>';}).join('')+'</div>';
}

async function renderMasterProjekte(){
  const el=document.getElementById('mpanel-projekte');
  const{data:bRes}=await sb.from('berichte').select('*');const allB=bRes||[];
  el.innerHTML='<div class="m-sec"><div class="m-sec-title">Projekt-Stunden</div>'+PROJEKTE.map(p=>{const ist=allB.filter(b=>b.projekt_id===p.id).reduce((s,b)=>s+(parseFloat(b.netto_gesamt_h||0)),0);return'<div class="proj-row"><div style="display:flex;justify-content:space-between"><div><div style="font-family:monospace;font-size:10px;color:var(--gold)">'+p.nr+'</div><div style="font-size:13px;font-weight:600;color:#ddd">'+p.name+'</div></div><div style="font-family:monospace;font-size:14px;color:var(--gold)">'+ist.toFixed(1)+'h</div></div></div>';}).join('')+'</div>';
}

async function renderMasterDaten(){
  const el=document.getElementById('mpanel-daten');
  el.innerHTML='<div class="m-sec"><div class="m-sec-title">Export</div><div class="row"><div class="fg w50"><label class="m-label">Von</label><input type="date" id="master-exp-von" class="m-input"></div><div class="fg w50"><label class="m-label">Bis</label><input type="date" id="master-exp-bis" class="m-input"></div></div><button class="m-btn m-btn-p" onclick="masterExpCSV()">Vollexport CSV</button></div>';
}
async function masterExpCSV(){const von=document.getElementById('master-exp-von').value,bis=document.getElementById('master-exp-bis').value;let q=sb.from('berichte').select('*').order('datum');if(von)q=q.gte('datum',von);if(bis)q=q.lte('datum',bis);const{data}=await q;if(!data?.length){toast('Keine Daten','err');return;}const hdr='Datum;MA-Name;MA-Nr;Projekt;Rolle;Von;Bis;Netto-h;Gesamt-h';const rows=data.map(b=>[b.datum,b.mitarbeiter_name,b.mitarbeiter_nr||'',b.projekt_nr,b.rolle,b.von||'',b.bis||'',b.netto_arbeit_h||0,b.netto_gesamt_h||b.netto_arbeit_h||0].join(';'));dlFile('KLEI_Export_'+new Date().toISOString().split('T')[0]+'.csv',[hdr,...rows].join('\n'),'text/csv;charset=utf-8');toast('Export fertig','ok');}

async function renderMasterEinst(){
  const el=document.getElementById('mpanel-einst');
  el.innerHTML='<div class="m-sec"><div class="m-sec-title">Master-Passwort aendern</div><div class="row"><div class="fg w50"><label class="m-label">Neu</label><input type="password" id="new-master-pw" class="m-input"></div><div class="fg w50"><label class="m-label">Bestaetigen</label><input type="password" id="new-master-pw2" class="m-input"></div></div><button class="m-btn m-btn-p" onclick="changeMasterPW()">Aendern</button></div><div class="m-sec"><div class="m-sec-title">System</div><div style="font-family:monospace;font-size:10px;color:#666;line-height:2">Version: 2.0 DEV<br>Supabase EU<br>E-Mail: tagesbericht@klei-galabau.de + Gmail</div></div>';
}
async function changeMasterPW(){const p1=document.getElementById('new-master-pw').value.trim(),p2=document.getElementById('new-master-pw2').value.trim();if(!p1||p1.length<6){toast('Min. 6 Zeichen','err');return;}if(p1!==p2){toast('Stimmen nicht ueberein','err');return;}await sb.from('gf_config').update({wert:p1}).eq('schluessel','master_passwort');toast('Geaendert!','ok');document.getElementById('new-master-pw').value='';document.getElementById('new-master-pw2').value='';}
